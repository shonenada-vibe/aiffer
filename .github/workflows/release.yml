name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-targets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-15-intel
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev

      - name: Install macOS OpenSSL
        if: contains(matrix.target, 'apple-darwin')
        run: |
          brew install openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build release bundles (macOS)
        if: contains(matrix.target, 'apple-darwin')
        run: bun run tauri build --target ${{ matrix.target }} --bundles app

      - name: Build release bundles (non-macOS)
        if: "!contains(matrix.target, 'apple-darwin')"
        run: bun run tauri build --target ${{ matrix.target }}

      - name: Package macOS app bundle
        if: contains(matrix.target, 'apple-darwin')
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          APP_PATH="$BUNDLE_DIR/aiffer.app"
          if [ -d "$APP_PATH" ]; then
            tar czf "$BUNDLE_DIR/aiffer_${{ matrix.target }}.app.tar.gz" -C "$BUNDLE_DIR" "aiffer.app"
          fi

      - name: Upload target artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**
          if-no-files-found: warn

  publish-release:
    needs: build-targets
    runs-on: ubuntu-latest
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist/release-assets

      - name: List collected artifacts
        run: find dist/release-assets -type f | sort

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "aiffer ${{ github.ref_name }}"
          body: "See assets below for platform-specific installers."
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/release-assets/**/*

  homebrew-cask:
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cask generation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate Homebrew cask
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/generate-homebrew-cask.sh \
            --tag "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --output "dist/homebrew/aiffer.rb"

      - name: Upload Homebrew cask to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/homebrew/aiffer.rb
